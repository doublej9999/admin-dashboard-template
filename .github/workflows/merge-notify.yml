name: Merge Notifications

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  notify:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Post merge notification
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const title = "Merge Notifications";

            const list = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            let issue = list.data.find((i) => i.title === title);
            if (!issue) {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body: "Auto-generated merge notifications will appear below.",
              });
              issue = created.data;
            }

            const body = pr.body || "";
            const extract = (heading) => {
              const re = new RegExp(`^##\\s*${heading}\\s*([\\s\\S]*?)(?=\\n##\\s|$)`, "mi");
              const match = body.match(re);
              return match ? match[1].trim() : "";
            };
            const normalizeLines = (text) => {
              const lines = text
                .split("\n")
                .map((l) => l.replace(/^[-*]\s+/, "").trim())
                .filter(Boolean);
              if (!lines.length) return "N/A";
              return lines.map((l) => `- ${l}`).join("\n  ");
            };

            const summary = normalizeLines(extract("Summary"));
            const testing = normalizeLines(extract("Testing"));
            const screenshots = normalizeLines(extract("Screenshots"));
            const risk = normalizeLines(extract("Risk / Rollback"));

            const commentBody = [
              `✅ Merged: ${pr.title}`,
              `- PR: ${pr.html_url}`,
              `- 功能摘要：${summary}`,
              `- 手动测试：${testing}`,
              `- 截图说明：${screenshots}`,
              `- 风险/回滚：${risk}`,
              `\n@doublej9999`,
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body: commentBody,
            });
